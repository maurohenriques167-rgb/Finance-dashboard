<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastro - Finance Dashboard</title>

    <link rel="stylesheet" href="login.css">

</head>


<body>
CADASTRO FUNCIONANDO

<div class="login-container">


    <div class="logo">

        <h1>💰 Finance</h1>

        <p>Crie sua conta e organize sua vida financeira</p>

    </div>




    <form id="cadastroForm">


        <div class="input-box">

            <label>Nome</label>

            <input
            id="name"
            type="text"
            placeholder="Digite seu nome"
            required
            >

        </div>




        <div class="input-box">

            <label>Email</label>

            <input
            id="email"
            type="email"
            placeholder="Digite seu email"
            required
            >

        </div>




        <div class="input-box">

            <label>Senha</label>

            <input
            id="password"
            type="password"
            placeholder="Crie uma senha"
            required
            >

        </div>
        <div class="input-box">

<label>Confirmar senha</label>

<input
id="confirmPassword"
type="password"
placeholder="Confirme sua senha"
required
>

</div>




        <button type="submit">

            Criar conta

        </button>


    </form>




    <p id="mensagem"></p>




    <div class="cadastro-link">


        <p>

            Já possui uma conta?

            <a href="login.html">

                Entrar

            </a>

        </p>


    </div>



</div>

<footer>
    <p>
        © 2026 Finance Dashboard |
        <a href="sobre.html">Sobre o sistema</a>
    </p>
</footer>


<script src="cadastro.js"></script>


</body>

</html>
