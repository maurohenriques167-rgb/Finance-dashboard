<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - Finance Dashboard</title>

    <link rel="stylesheet" href="login.css">

</head>


<body>


<div class="login-container">


    <div class="logo">

        <h1>💰 Finance</h1>

        <p>Controle suas finanças de forma simples</p>

    </div>



    <form id="loginForm">


        <div class="input-box">

            <label>Email</label>

            <input 
            id="email"
            type="email"
            placeholder="Digite seu email"
            required
            >

        </div>




        <div class="input-box">

            <label>Senha</label>

            <input 
            id="password"
            type="password"
            placeholder="Digite sua senha"
            required
            >

        </div>




        <button type="submit">

            Entrar

        </button>


    </form>



    <p id="mensagem"></p>



    <div class="cadastro-link">

        <p>
            Ainda não possui conta?
            <a href="cadastro.html">
                Criar conta
            </a>
        </p>

    </div>



</div>



<script src="login.js"></script>


</body>

</html>
